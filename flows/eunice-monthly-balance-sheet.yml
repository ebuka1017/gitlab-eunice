name: "eunice-monthly-balance-sheet"
description: "Monthly debt balance sheet: tracks debt added vs paid down, propagated risk trends, CI waste, and CO₂ impact month-over-month."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: collect_evidence
      type: AgentComponent
      prompt_id: collector_prompt
      inputs:
        - context:goal
      toolset:
        - get_project
        - gitlab_merge_request_search
        - list_commits
        - list_issues
        - get_issue
        - get_issue_note
        - list_issue_notes
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
        - read_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: build_debt_graph
      type: AgentComponent
      prompt_id: graph_prompt
      inputs:
        - collect_evidence:output
        - context:goal
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - list_dir
        - get_repository_file
        - list_commits
        - get_commit
        - list_issues
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: plan_paydown
      type: AgentComponent
      prompt_id: planner_prompt
      inputs:
        - build_debt_graph:output
        - collect_evidence:output
        - context:goal
      toolset:
        - get_project
        - list_issues
        - gitlab_issue_search
        - run_command
        - read_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: take_action
      type: AgentComponent
      prompt_id: actioner_prompt
      inputs:
        - plan_paydown:output
        - build_debt_graph:output
        - collect_evidence:output
        - context:goal
      toolset:
        - get_project
        - list_issues
        - get_issue
        - list_issue_notes
        - gitlab_issue_search
        - create_issue
        - create_issue_note
        - update_issue
        - read_file
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  prompts:
    - prompt_id: collector_prompt
      name: Eunice Monthly Collector
      prompt_template:
        system: |
          You are eunice-collector running in monthly balance sheet mode.
          Window: last 30 days vs prior 30 days (month-over-month comparison).

          Collect:
          1. DEBT ADDED THIS MONTH
             - New eunice-debt issues created in last 30 days (gitlab_issue_search, label=eunice-debt, created_at > 30d ago)
             - Total estimated annual cost of new findings (sum from issue descriptions if available)

          2. DEBT PAID DOWN THIS MONTH
             - eunice-debt issues closed in last 30 days (gitlab_issue_search, label=eunice-debt, state=closed)
             - Estimated annual savings from closed items (from issue descriptions if available)

          3. RECURRING HOTSPOTS
             - Files with repeat_eunice_flags >= 2 that are still open
             - Files that were flagged, closed, and reflagged within 60 days

          4. CI WASTE THIS MONTH
             - Total wasted_runner_seconds across all failed/retried pipelines in last 30 days
             - Compare to prior 30 days if pipeline history is available

          5. PRIOR BALANCE SHEET
             - Search for prior Eunice monthly balance sheet issues (title contains "Eunice Monthly Balance Sheet")
             - Extract prior month's net_debt_usd if available for trend comparison

          Return JSON only:
          {
            "summary": "...",
            "analysis_mode": "nia_enhanced|gitlab_only",
            "confidence": "high|medium|low",
            "period": { "current_month_start": "...", "prior_month_start": "..." },
            "debt_added": {
              "issue_count": number,
              "total_annual_cost_usd": number|null,
              "note": "cost extracted from issue descriptions | not available"
            },
            "debt_paid_down": {
              "issue_count": number,
              "total_annual_savings_usd": number|null
            },
            "recurring_hotspots": [
              {"path": "...", "repeat_flags": number, "issue_id": "...", "status": "open|reflagged"}
            ],
            "ci_waste": {
              "current_month_wasted_runner_seconds": number,
              "prior_month_wasted_runner_seconds": number|null
            },
            "prior_balance_sheet": {
              "issue_id": "...|not found",
              "prior_net_debt_usd": number|null
            },
            "data_gaps": [...],
            "evidence_sources": [...]
          }
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: graph_prompt
      name: Eunice Monthly Graph
      prompt_template:
        system: |
          You are eunice-graph running in monthly balance sheet mode.
          Your job is to calculate the net debt trend and identify compounding hotspots.

          BALANCE SHEET CALCULATION:
          net_debt_change_usd = debt_added.total_annual_cost_usd - debt_paid_down.total_annual_savings_usd
          If positive: debt is growing. If negative: debt is shrinking. Label clearly.

          CO₂ TREND:
          current_month_co2_kg = (current_month_wasted_runner_seconds/3600) * 0.1 * 0.350
          prior_month_co2_kg = (prior_month_wasted_runner_seconds/3600) * 0.1 * 0.350 (if available)
          co2_trend = current - prior (positive = worse, negative = improvement)
          Source: Eco-CI estimation model. Label all assumptions.

          COMPOUNDING RISK:
          For recurring_hotspots: these are files that compound over time.
          For each: calculate total_cost_if_unresolved_12m = annual_cost * (1 + 0.1 * months_open)
          This models the compounding cost of inaction.

          Return JSON only:
          {
            "summary": "...",
            "analysis_mode": "...",
            "confidence": "...",
            "balance_sheet": {
              "debt_added_usd": number|null,
              "debt_paid_down_usd": number|null,
              "net_debt_change_usd": number|null,
              "trend": "improving|worsening|stable|insufficient_data",
              "prior_net_debt_usd": number|null
            },
            "carbon": {
              "current_month_co2_kg": number,
              "prior_month_co2_kg": number|null,
              "co2_trend_kg": number|null,
              "trend": "improving|worsening|stable|insufficient_data",
              "methodology": "Eco-CI estimation model",
              "assumptions": "100W runner, 350 gCO2/kWh global average"
            },
            "compounding_hotspots": [
              {
                "path": "...", "repeat_flags": number,
                "estimated_annual_cost_usd": number|null,
                "total_cost_if_unresolved_12m": number|null,
                "compounding_formula": "annual_cost * (1 + 0.1 * months_open)"
              }
            ],
            "assumptions": { ... }
          }
        user: |
          Goal: {{goal}}
          Collector output: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: planner_prompt
      name: Eunice Monthly Planner
      prompt_template:
        system: |
          You are eunice-planner running in monthly balance sheet mode.
          Produce a summary and next-month priorities from the balance sheet data.

          MONTHLY SUMMARY FORMAT:
          - Net debt trend (growing/shrinking by $X)
          - CO₂ trend (better/worse by Y kg/month)
          - Top 3 compounding hotspots to address next month
          - Recommended debt budget for next sprint (based on trend severity)

          NEXT MONTH PRIORITIES:
          - Prioritize compounding_hotspots with highest total_cost_if_unresolved_12m
          - Include any items where repeat_flags >= 3 (critical escalation)
          - Recommend increased debt_budget_hours if debt trend is worsening

          Return JSON only:
          {
            "summary": "...",
            "analysis_mode": "...",
            "confidence": "...",
            "monthly_verdict": {
              "debt_trend": "improving|worsening|stable",
              "carbon_trend": "improving|worsening|stable",
              "headline": "one sentence summary for leadership"
            },
            "next_month_priorities": [
              {
                "rank": number, "path": "...",
                "urgency": "critical|high|medium|low",
                "reason": "...",
                "estimated_annual_cost_usd": number|null,
                "recommended_action": "..."
              }
            ],
            "recommended_debt_budget_hours": number,
            "budget_rationale": "...",
            "success_metrics": [...]
          }
        user: |
          Goal: {{goal}}
          Upstream outputs: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: actioner_prompt
      name: Eunice Monthly Actioner
      prompt_template:
        system: |
          You are eunice-actioner running in monthly balance sheet mode.
          Create a monthly balance sheet GitLab issue.

          LIFECYCLE CHECK FIRST:
          - gitlab_issue_search for title containing "Eunice Monthly Balance Sheet" in last 35 days
          - If found: add a note with this month's update. Do NOT create duplicate.

          MONTHLY BALANCE SHEET ISSUE CONTENT:
          - Title: "Eunice Monthly Balance Sheet — {month} {year}"
          - Sections:
            1. Headline (one sentence: debt growing/shrinking, CO₂ trend)
            2. Balance Sheet Table:
               | | This Month | Last Month | Change |
               | Debt Added ($) | | | |
               | Debt Paid Down ($) | | | |
               | Net Debt Change ($) | | | |
               | CI Waste (runner min) | | | |
               | CO₂ Emissions (kg) | | | |
            3. Compounding Hotspots (files accruing cost without resolution)
            4. Next Month Priorities (table: file, urgency, recommended action)
            5. Recommended Debt Budget (hours, with rationale)
            6. Methodology & Assumptions (Eco-CI citation, eunice.yml values)
          - Labels: eunice-debt, eunice-monthly-report

          Return JSON only (same shape as eunice-actioner standalone output).
        user: |
          Goal: {{goal}}
          Upstream outputs: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
  routers:
    - from: collect_evidence
      to: build_debt_graph
    - from: build_debt_graph
      to: plan_paydown
    - from: plan_paydown
      to: take_action
    - from: take_action
      to: end
  flow:
    entry_point: collect_evidence

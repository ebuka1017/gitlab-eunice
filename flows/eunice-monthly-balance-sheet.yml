name: "eunice-monthly-balance-sheet"
description: "Monthly debt balance sheet flow tracking debt added, debt paid down, propagated risk trends, and CI waste impact."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: collect_evidence
      type: AgentComponent
      prompt_id: collector_prompt
      inputs: [context:goal]
      toolset: [get_project, gitlab_merge_request_search, list_commits, list_issues, get_issue, get_issue_note, list_issue_notes, gitlab_issue_search, get_job_logs, get_pipeline_errors, run_command, read_file]
    - name: build_debt_graph
      type: AgentComponent
      prompt_id: graph_prompt
      inputs: [collect_evidence:output, context:goal]
      toolset: [read_file, read_files, find_files, grep, list_dir, get_repository_file, list_commits, get_commit, list_issues, gitlab_issue_search, get_job_logs, get_pipeline_errors, run_command]
    - name: plan_paydown
      type: AgentComponent
      prompt_id: planner_prompt
      inputs: [build_debt_graph:output, collect_evidence:output, context:goal]
      toolset: [get_project, list_issues, gitlab_issue_search, run_command, read_file]
    - name: take_action
      type: AgentComponent
      prompt_id: actioner_prompt
      inputs: [plan_paydown:output, build_debt_graph:output, collect_evidence:output, context:goal]
      toolset: [get_project, list_issues, get_issue, list_issue_notes, gitlab_issue_search, create_issue, create_issue_note, update_issue, read_file, run_command]
      ui_log_events: [on_agent_final_answer, on_tool_execution_success]
  prompts:
    - prompt_id: collector_prompt
      name: Eunice Monthly Collector
      prompt_template:
        system: |
          Gather monthly Eunice evidence from GitLab and return JSON only. Focus on debt-related issues, closures, repeats, MR churn, and CI waste/stability signals.
          Label measured vs estimated values and include data gaps.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: graph_prompt
      name: Eunice Monthly Graph
      prompt_template:
        system: |
          Build a month-over-month debt graph/trend summary from collected evidence. Identify repeated hotspots and propagated risk changes. Return JSON only.
        user: |
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: planner_prompt
      name: Eunice Monthly Planner
      prompt_template:
        system: |
          Produce a monthly debt balance sheet summary: debt added, debt paid down, net change, top recurring hotspots, and next-month priorities. Return JSON only.
          Include confidence and assumptions.
        user: |
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: actioner_prompt
      name: Eunice Monthly Actioner
      prompt_template:
        system: |
          Create or draft a monthly Eunice balance sheet issue/report in GitLab. Include net debt trend, propagated hotspots, CI waste notes, confidence/mode, and next-month actions. Return JSON summarizing actions.
        user: |
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 180 }
  routers:
    - { from: collect_evidence, to: build_debt_graph }
    - { from: build_debt_graph, to: plan_paydown }
    - { from: plan_paydown, to: take_action }
    - { from: take_action, to: end }
  flow:
    entry_point: collect_evidence

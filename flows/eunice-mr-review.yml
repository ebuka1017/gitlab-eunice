name: "eunice-mr-review"
description: "Merge request debt triage flow: collect MR-scoped evidence, build propagation-aware debt graph, and produce actionable MR feedback with cost and CO₂ math."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: collect_evidence
      type: AgentComponent
      prompt_id: collector_prompt
      inputs:
        - context:goal
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - list_dir
        - get_repository_file
        - get_project
        - get_merge_request
        - gitlab_merge_request_search
        - list_all_merge_request_notes
        - list_commits
        - get_commit
        - get_commit_diff
        - list_issues
        - get_issue
        - get_issue_note
        - list_issue_notes
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: build_debt_graph
      type: AgentComponent
      prompt_id: graph_prompt
      inputs:
        - collect_evidence:output
        - context:goal
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - list_dir
        - get_repository_file
        - get_project
        - get_merge_request
        - gitlab_merge_request_search
        - list_commits
        - get_commit
        - get_commit_diff
        - list_issues
        - get_issue
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: take_action
      type: AgentComponent
      prompt_id: actioner_prompt
      inputs:
        - build_debt_graph:output
        - collect_evidence:output
        - context:goal
      toolset:
        - get_project
        - get_merge_request
        - gitlab_merge_request_search
        - list_all_merge_request_notes
        - list_issues
        - get_issue
        - get_issue_note
        - list_issue_notes
        - gitlab_issue_search
        - create_merge_request_note
        - create_issue
        - create_issue_note
        - update_issue
        - read_file
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  prompts:
    - prompt_id: collector_prompt
      name: Eunice MR Collector
      prompt_template:
        system: |
          You are eunice-collector running in MR review mode.
          Scope: the files changed in this merge request only.
          Do not invent values. Report data gaps rather than guessing.

          For each file changed in the MR, collect:

          1. COMMIT SIGNALS
             - commit count over last 30 days for this file (list_commits, filter by path)
             - distinct authors who touched the file recently

          2. MERGE REQUEST SIGNALS
             - this MR: created_at, current review duration in minutes (now - created_at)
             - prior MRs touching this file: count, avg review duration (gitlab_merge_request_search)
             - discussion thread count on this MR (list_all_merge_request_notes, count threads)

          3. ISSUE SIGNALS
             - open bug issues referencing this file or component (gitlab_issue_search, bug label)
             - /spend time tracked on those issues (list_issue_notes, grep for /spend)
             - prior eunice-debt issues for this file (gitlab_issue_search, label=eunice-debt)
             - count repeat_eunice_flags from prior open/closed eunice issues

          4. PIPELINE / CI SIGNALS
             - failed pipeline count last 30 days (get_pipeline_errors)
             - wasted_runner_seconds: sum of duration_seconds for failed/retried jobs (get_job_logs)
             - flaky test evidence: jobs that failed then passed on retry

          5. CODE SIGNALS
             - line count of changed files (run_command: wc -l)
             - presence of test files for changed files (find_files)

          Nia usage: if Nia tools are available, use them first to identify
          all files that import the changed files (dependency surface). Otherwise use grep.

          Return JSON only:
          {
            "summary": "one sentence describing the MR debt surface",
            "analysis_mode": "nia_enhanced|gitlab_only",
            "confidence": "high|medium|low",
            "target": {
              "scope": "mr",
              "mr_id": "...",
              "changed_files": ["..."],
              "window_days": 30
            },
            "signals": {
              "measured": {
                "commits_30d": number,
                "distinct_authors": number,
                "mr_review_minutes_current": number,
                "avg_mr_review_minutes_historical": number|null,
                "mr_discussion_threads": number,
                "bug_issues_count": number,
                "bug_time_tracked_hours": number|null,
                "repeat_eunice_flags": number,
                "failed_pipelines_30d": number,
                "wasted_runner_seconds": number,
                "flaky_test_reruns": number,
                "file_loc": number|null,
                "has_tests": boolean|null
              },
              "estimated": {}
            },
            "evidence_sources": [
              { "type": "commits|mrs|issues|pipelines|files", "count": number, "note": "..." }
            ],
            "data_gaps": ["..."],
            "assumptions": {}
          }

          Confidence rules:
          - high: >= 4 measured signal types populated
          - medium: 2-3 measured signal types populated
          - low: <= 1, or no commit/pipeline data available
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
    - prompt_id: graph_prompt
      name: Eunice MR Graph
      prompt_template:
        system: |
          You are eunice-graph running in MR review mode.
          Build a debt risk graph for the files changed in this MR.

          COST FORMULA (show your math for every node):
          annual_dev_cost =
            (commits_30d * avg_mr_review_minutes/60 * dev_hourly_rate * 12)
            + (bug_issues_count * avg_bug_fix_hours * dev_hourly_rate)
            + (failed_pipelines_30d * 1.0 * dev_hourly_rate * 12)

          Defaults (label all as ASSUMED from eunice.yml default):
            dev_hourly_rate: 75
            avg_bug_fix_hours: 3
            avg_pipeline_debug_hours: 1.0

          PROPAGATION FORMULA (show your math):
          propagated_cost = direct_cost * propagation_multiplier
          propagation_multiplier = min(1 + (dependent_count * 0.15), 4.0)
          Find dependents via Nia (preferred) or grep for imports/requires of the changed filename.
          Label every heuristic edge: "confidence": "low", "method": "heuristic"
          Never claim a dependency without evidence — omit and note as data gap instead.

          CO₂ FORMULA (required if wasted_runner_seconds > 0):
          energy_kwh = (wasted_runner_seconds / 3600) * runner_watts / 1000
          co2_grams_monthly = energy_kwh * grid_intensity_gco2_per_kwh
          co2_kg_annual = co2_grams_monthly * 12 / 1000
          Defaults (label as ASSUMED): runner_watts=100, grid_intensity=350
          Source: Eco-CI estimation model (https://green-coding.io/projects/eco-ci/)
          If wasted_runner_seconds = 0 or missing, set carbon to null and note data gap.

          debt_root_node criteria: high direct_risk AND >= 2 dependents AND confidence >= medium.

          Include mermaid_graph when >= 2 nodes with edges exist at medium+ confidence.

          Return JSON only:
          {
            "summary": "one sentence summary of MR debt risk",
            "analysis_mode": "nia_enhanced|gitlab_only",
            "confidence": "high|medium|low",
            "signals": {
              "measured": { ...passthrough from collector... },
              "estimated": {}
            },
            "assumptions": {
              "dev_hourly_rate": { "value": 75, "source": "eunice.yml default" },
              "avg_bug_fix_hours": { "value": 3, "source": "eunice.yml default" },
              "runner_watts": { "value": 100, "source": "eunice.yml default" },
              "grid_intensity_gco2_per_kwh": { "value": 350, "source": "eunice.yml default" }
            },
            "graph": {
              "nodes": [
                {
                  "id": "node_1",
                  "path": "...",
                  "debt_types": ["high_complexity", "missing_tests"],
                  "direct_annual_cost_usd": number,
                  "propagated_annual_cost_usd": number,
                  "propagation_multiplier": number,
                  "propagation_formula": "1 + (3 * 0.15) = 1.45",
                  "cost_formula": "12 * 14/60 * $75 * 12 = $2,520 + ...",
                  "dependent_count": number,
                  "carbon": {
                    "wasted_runner_seconds": number|null,
                    "energy_kwh": number|null,
                    "co2_grams_monthly": number|null,
                    "co2_kg_annual": number|null,
                    "methodology": "Eco-CI estimation model",
                    "assumptions": "100W runner, 350 gCO2/kWh global average"
                  },
                  "confidence": "high|medium|low"
                }
              ],
              "edges": [
                {
                  "from": "node_1",
                  "to": "node_2",
                  "relationship": "imports|calls|inherits|duplicates",
                  "confidence": "high|medium|low",
                  "method": "nia_semantic|grep|heuristic"
                }
              ]
            },
            "hotspots": [...],
            "debt_root_nodes": [...],
            "total_portfolio_cost_usd": number,
            "total_co2_kg_annual": number|null,
            "mermaid_graph": "graph TD\n  ..." | null
          }
        user: |
          Goal: {{goal}}
          Collector output: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
    - prompt_id: actioner_prompt
      name: Eunice MR Actioner
      prompt_template:
        system: |
          You are eunice-actioner running in MR review mode.
          Your job is to post a debt triage comment on this merge request.

          LIFECYCLE CHECK (do this first):
          1. list_all_merge_request_notes — search for existing Eunice comment on this MR
             - If found: add a follow-up note or update. Do NOT post a duplicate comment.
          2. gitlab_issue_search for label=eunice-debt + changed filename
             - If open issue exists: reference it in the MR comment. Do NOT create duplicate.
          3. Check repeat_eunice_flags from collector output:
             - >= 3: apply eunice-critical label, note escalation in comment
             - == 2: apply eunice-escalated label
             - 0-1: standard eunice-debt label only

          MR COMMENT (always post unless duplicate exists):
          Use this exact structure:

          ## 🔍 Eunice Debt Triage: `{filename}`

          **Annual Impact:** ${propagated_annual_cost_usd} (propagated) | **ROI:** {roi}x | **Confidence:** {confidence} ({analysis_mode})

          ### Measured Signals (from GitLab)
          | Signal | Value | Source |
          |--------|-------|--------|
          | Commits (30d) | {commits_30d} | list_commits |
          | Avg MR review | {avg_mr_review_minutes} min | MR timestamps |
          | Bug issues | {bug_issues_count} | gitlab_issue_search |
          | Failed pipelines (30d) | {failed_pipelines_30d} | get_pipeline_errors |
          | Wasted runner time | {wasted_runner_seconds}s/mo | get_job_logs |

          ### Cost Breakdown
          | Category | Calculation | Annual Cost |
          |----------|-------------|-------------|
          | Review overhead | {commits_30d} × {avg_mr_min}min/60 × ${dev_rate} × 12 | ${review_cost} |
          | Bug fixes | {bug_count} × {avg_bug_hrs}hrs × ${dev_rate} | ${bug_cost} |
          | CI failures | {failed_pipelines} × 1hr × ${dev_rate} × 12 | ${ci_cost} |
          | Propagation ({multiplier}×) | ${direct_cost} × {multiplier} | — |
          | **Direct total** | | **${direct_cost}** |
          | **Propagated total** | | **${propagated_cost}** |

          ### CI Waste & Carbon
          - Wasted runner time: {wasted_runner_minutes} min/month
          - Estimated energy: {energy_kwh} kWh/month
          - Estimated CO₂: **{co2_kg_annual} kg/year**
          - *Eco-CI methodology | {runner_watts}W runner, {grid_intensity} gCO₂/kWh ({runner_region}) — override in eunice.yml*

          ### Propagation Risk
          {if root node: "⚠️ Root node — {dependent_count} files depend on this. Fixing it unlocks improvements in: {dependent_list}"}
          {if not root node: "No significant propagation risk detected at current confidence level."}

          ### Assumptions (from eunice.yml)
          - dev_hourly_rate: ${dev_hourly_rate} | avg_bug_fix_hours: {avg_bug_fix_hours}hrs | runner_watts: {runner_watts}W

          ### Recommended Fix ({effort_hours}hrs, ROI: {roi}x)
          1. {action_1}
          2. {action_2}
          3. {action_3}

          ---
          📊 Priority: {urgency} | 🔁 Times flagged: {repeat_flags} | 🤖 Eunice {analysis_mode} | {date}

          NEW ISSUE: create only when:
          - propagated_annual_cost_usd >= 3000 (or eunice.yml threshold)
          - confidence >= medium
          - no open eunice-debt issue already exists for this file

          If no significant debt found (low confidence, ROI < 3x, or no measured signals):
          Post a short note: "Eunice found no significant debt in the changed files at current confidence level.
          Signals available: {list}. Data gaps: {list}."
          Do NOT post a full triage comment for low-signal findings.

          Return JSON only:
          {
            "action_plan": "...",
            "artifacts_created": [
              { "type": "mr_note|issue|issue_note|issue_update", "id": "...", "url": "..." }
            ],
            "artifacts_drafted": [
              { "type": "...", "content": "full draft text" }
            ],
            "skipped_actions": [
              { "type": "...", "reason": "duplicate exists at {url}|confidence too low|below threshold" }
            ],
            "lifecycle_summary": {
              "existing_issues_found": number,
              "repeat_flags": number,
              "escalation_applied": "none|eunice-escalated|eunice-critical"
            }
          }
        user: |
          Goal: {{goal}}
          Upstream outputs: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
  routers:
    - from: collect_evidence
      to: build_debt_graph
    - from: build_debt_graph
      to: take_action
    - from: take_action
      to: end
  flow:
    entry_point: collect_evidence

name: "eunice-mr-review"
description: "Analyze merge request changes for technical debt, compute cost/ROI, and post actionable GitLab feedback."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: "detect_debt"
      type: AgentComponent
      prompt_id: "debt_detector"
      inputs: ["context:goal"]
      toolset: [read_file, read_files, find_files, grep, list_repository_tree, gitlab_blob_search]
      ui_log_events: [on_agent_final_answer, on_tool_execution_success]
    - name: "analyze_impact"
      type: AgentComponent
      prompt_id: "impact_analyzer"
      inputs: ["detect_debt:output", "context:goal"]
      toolset: [run_command, read_file, get_project, get_merge_request, list_commits, list_issues, gitlab_issue_search, list_merge_request_diffs, get_pipeline_failing_jobs, gitlab_api_get]
      ui_log_events: [on_agent_final_answer, on_tool_execution_success]
    - name: "post_feedback"
      type: AgentComponent
      prompt_id: "orchestrator"
      inputs: ["detect_debt:output", "analyze_impact:output", "context:goal"]
      toolset: [get_merge_request, create_merge_request_note, create_issue, create_issue_note, update_issue, gitlab__user_search]
      ui_log_events: [on_agent_final_answer, on_tool_execution_success]
  prompts:
    - prompt_id: "debt_detector"
      name: "Eunice Debt Detector"
      prompt_template:
        system: |
          You are eunice-debt-detector. Analyze merge request code changes for technical debt and return structured JSON findings with evidence and line numbers. Prefer Nia data if available; otherwise use GitLab repository read/search tools. Never hallucinate.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 180 }
    - prompt_id: "impact_analyzer"
      name: "Eunice Impact Analyzer"
      prompt_template:
        system: |
          You are eunice-impact-analyzer. Convert technical debt findings into transparent cost and ROI analysis using GitLab metrics and Eunice formulas. Separate measured inputs from configured assumptions in eunice.yml. Prefer conservative estimates.
        user: |
          Goal: {{goal}}

          Debt findings JSON:
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: "orchestrator"
      name: "Eunice Orchestrator"
      prompt_template:
        system: |
          You are eunice-orchestrator. Turn Eunice findings into actionable GitLab output: post a merge request comment with transparent metrics and, when thresholds are met, create/update a GitLab issue with labels/assignee.
        user: |
          Goal: {{goal}}

          Previous component outputs:
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 180 }
  routers:
    - { from: "detect_debt", to: "analyze_impact" }
    - { from: "analyze_impact", to: "post_feedback" }
    - { from: "post_feedback", to: "end" }
  flow:
    entry_point: "detect_debt"

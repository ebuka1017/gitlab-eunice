name: "eunice-weekly-audit"
description: "Weekly technical debt scan that ranks files by annual cost and ROI using GitLab metrics."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: "scan_codebase"
      type: AgentComponent
      prompt_id: "scan_prompt"
      inputs: ["context:goal"]
      toolset: [read_file, read_files, find_files, grep, list_repository_tree, gitlab_blob_search]
    - name: "calculate_impact"
      type: AgentComponent
      prompt_id: "impact_prompt"
      inputs: ["scan_codebase:output", "context:goal"]
      toolset: [run_command, get_project, list_commits, list_issues, gitlab_issue_search, gitlab_api_get]
    - name: "create_report"
      type: AgentComponent
      prompt_id: "report_prompt"
      inputs: ["scan_codebase:output", "calculate_impact:output", "context:goal"]
      toolset: [create_issue, create_issue_note, update_issue, gitlab__user_search]
  prompts:
    - prompt_id: "scan_prompt"
      name: "Weekly scan"
      prompt_template:
        system: |
          Scan the repository for top technical debt items (complexity, dead code, outdated dependencies, missing tests). Return structured JSON summary and top files with evidence.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: "impact_prompt"
      name: "Weekly impact"
      prompt_template:
        system: |
          Compute annual cost and ROI for top debt files using GitLab metrics and eunice.yml assumptions. Rank results by ROI and return structured JSON.
        user: |
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 240 }
    - prompt_id: "report_prompt"
      name: "Weekly report"
      prompt_template:
        system: |
          Create a weekly Eunice report issue summarizing total debt, top files, and next actions. Use transparent metrics and helpful tone.
        user: |
          {{context}}
        placeholder: history
      unit_primitives: []
      params: { timeout: 180 }
  routers:
    - { from: "scan_codebase", to: "calculate_impact" }
    - { from: "calculate_impact", to: "create_report" }
    - { from: "create_report", to: "end" }
  flow:
    entry_point: "scan_codebase"

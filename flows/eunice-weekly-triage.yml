name: "eunice-weekly-triage"
description: "Weekly debt triage flow: builds a dependency-aware debt graph across the repository and proposes a budget-aware paydown sprint with CO₂ impact."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: collect_evidence
      type: AgentComponent
      prompt_id: collector_prompt
      inputs:
        - context:goal
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - list_dir
        - get_repository_file
        - get_project
        - gitlab_merge_request_search
        - list_commits
        - get_commit
        - list_issues
        - get_issue
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: build_debt_graph
      type: AgentComponent
      prompt_id: graph_prompt
      inputs:
        - collect_evidence:output
        - context:goal
      toolset:
        - read_file
        - read_files
        - find_files
        - grep
        - list_dir
        - get_repository_file
        - get_project
        - list_commits
        - get_commit
        - get_commit_diff
        - list_issues
        - gitlab_issue_search
        - get_job_logs
        - get_pipeline_errors
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: plan_paydown
      type: AgentComponent
      prompt_id: planner_prompt
      inputs:
        - build_debt_graph:output
        - collect_evidence:output
        - context:goal
      toolset:
        - read_file
        - read_files
        - list_dir
        - get_project
        - list_commits
        - list_issues
        - gitlab_issue_search
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
    - name: take_action
      type: AgentComponent
      prompt_id: actioner_prompt
      inputs:
        - plan_paydown:output
        - build_debt_graph:output
        - collect_evidence:output
        - context:goal
      toolset:
        - get_project
        - list_issues
        - get_issue
        - list_issue_notes
        - gitlab_issue_search
        - create_issue
        - create_issue_note
        - update_issue
        - read_file
        - run_command
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  prompts:
    - prompt_id: collector_prompt
      name: Eunice Weekly Collector
      prompt_template:
        system: |
          You are eunice-collector running in weekly triage mode.
          Scope: entire repository (not a single MR).
          Window: last 30 days of activity.

          Identify the top churn hotspots across the repo:
          - Use list_commits to find the 10-20 most frequently changed files in the last 30 days
          - For each hotspot file: collect commits_30d, mr_count, bug_issues_count, repeat_eunice_flags
          - Use get_pipeline_errors + get_job_logs to collect wasted_runner_seconds per hotspot
          - Use gitlab_issue_search (label=eunice-debt) to find all prior Eunice findings and their status
          - Report data gaps explicitly

          Return JSON only:
          {
            "summary": "...",
            "analysis_mode": "nia_enhanced|gitlab_only",
            "confidence": "high|medium|low",
            "target": {"scope": "repository", "window_days": 30},
            "hotspot_candidates": [
              {
                "path": "...",
                "signals": {
                  "measured": {
                    "commits_30d": number, "mr_count": number,
                    "bug_issues_count": number, "repeat_eunice_flags": number,
                    "failed_pipelines_30d": number, "wasted_runner_seconds": number
                  },
                  "estimated": {}
                }
              }
            ],
            "prior_eunice_issues": [
              {"path": "...", "issue_id": "...", "status": "open|closed", "created_at": "..."}
            ],
            "data_gaps": [...],
            "evidence_sources": [...]
          }
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: graph_prompt
      name: Eunice Weekly Graph
      prompt_template:
        system: |
          You are eunice-graph running in weekly triage mode.
          Build a repository-wide debt graph from the collector's hotspot candidates.

          For each hotspot candidate:
          - Calculate direct_annual_cost using the standard formula:
            (commits_30d * avg_mr_review_minutes/60 * 75 * 12)
            + (bug_issues_count * 3 * 75)
            + (failed_pipelines_30d * 1.0 * 75 * 12)
            Label all defaults as ASSUMED.

          - Calculate propagated_annual_cost:
            propagation_multiplier = min(1 + (dependent_count * 0.15), 4.0)
            propagated_cost = direct_cost * multiplier
            Find dependents via grep (imports/requires) or Nia if available.

          - Calculate CO₂ if wasted_runner_seconds > 0:
            energy_kwh = (wasted_runner_seconds/3600) * 0.1
            co2_kg_annual = energy_kwh * 0.350 * 12
            Source: Eco-CI estimation model. Label watts and grid intensity as ASSUMED.

          - Identify debt_root_nodes (high direct_risk + >= 2 dependents + confidence >= medium)
          - Generate mermaid_graph for top 5-8 nodes if edge evidence exists

          Return JSON only (same shape as eunice-graph standalone output).
        user: |
          Goal: {{goal}}
          Collector output: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: planner_prompt
      name: Eunice Weekly Planner
      prompt_template:
        system: |
          You are eunice-planner running in weekly triage mode.
          Produce a sprint plan and backlog for the coming week.

          RULES:
          - Fix debt_root_nodes first (dependency order)
          - Respect debt_budget_hours (default 20hrs)
          - Show ROI formula for every item: annual_cost / (effort_hours * 75)
          - Escalate repeat_eunice_flags >= 3 to critical urgency
          - Include defer_candidates when ROI < 3x or confidence = low
          - Sum total_co2_kg_saved_annual across all sprint items
          - Include success_metrics (measurable outcomes to verify after sprint)

          Return JSON only (same shape as eunice-planner standalone output).
        user: |
          Goal: {{goal}}
          Upstream outputs: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240
    - prompt_id: actioner_prompt
      name: Eunice Weekly Actioner
      prompt_template:
        system: |
          You are eunice-actioner running in weekly triage mode.
          Create a GitLab issue for the weekly debt triage report.

          LIFECYCLE CHECK FIRST:
          - gitlab_issue_search for title containing "Eunice Weekly Triage" — if open issue from last 7 days exists, add a note instead of creating new
          - For each sprint item: check for existing eunice-debt issues (same lifecycle rules as standard actioner)

          WEEKLY REPORT ISSUE CONTENT:
          - Title: "Eunice Weekly Triage — {date} — Top {N} debt items, ${total_cost}/yr identified"
          - Sections:
            1. Executive Summary (2-3 sentences: total cost, top root node, sprint recommendation)
            2. Sprint Plan (ordered table: file, urgency, effort, annual savings, ROI, CO₂ saved)
            3. Debt Graph (Mermaid diagram if available)
            4. CI Waste & Carbon Summary (total wasted runner minutes, total CO₂ kg/yr)
            5. Backlog (top 10 table)
            6. Deferred Items
            7. Methodology & Assumptions (cite Eco-CI, eunice.yml values)
          - Labels: eunice-debt, eunice-weekly-triage

          Return JSON only (same shape as eunice-actioner standalone output).
        user: |
          Goal: {{goal}}
          Upstream outputs: {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
  routers:
    - from: collect_evidence
      to: build_debt_graph
    - from: build_debt_graph
      to: plan_paydown
    - from: plan_paydown
      to: take_action
    - from: take_action
      to: end
  flow:
    entry_point: collect_evidence
